name: Symfony CI

on:
  push:
    branches: [ "main", "staging", "develop" ]
  pull_request:
    branches: [ "main", "staging", "develop" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  symfony-tests:
    runs-on: ubuntu-latest
    services:
      # Postgres Service
      database:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: app_test
          POSTGRES_PASSWORD: "testpassword123"
          POSTGRES_USER: app
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Redis Service
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    # Install PHP and extensions
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: ctype, iconv, pdo, pdo_pgsql, redis
        tools: composer:v2, cs-check
        coverage: none

    # Cache Composer packages to speed up builds
    - name: Get composer cache directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-

    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

    # Prepare portions of the database that tests might rely on
    - name: Create Database
      run: |
        php bin/console doctrine:database:create --env=test
        php bin/console doctrine:schema:create --env=test
      env:
        DATABASE_URL: postgresql://app:testpassword123@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8
        REDIS_URL: redis://127.0.0.1:6379

    # Run the PHPUnit tests
    - name: Execute tests (Unit and Feature tests) via PHPUnit
      run: vendor/bin/phpunit
      env:
        DATABASE_URL: postgresql://app:testpassword123@127.0.0.1:5432/app_test?serverVersion=16&charset=utf8
        REDIS_URL: redis://127.0.0.1:6379

    # Run Static Analysis
    - name: Execute static analysis (PHPStan)
      run: vendor/bin/phpstan analyse -c phpstan.neon.dist

  deploy_staging:
    # Trigger only if it's a PUSH event to the 'staging' branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    # Ensure tests pass before deploying
    needs: symfony-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Execute the custom deployment script
      - name: Deploy to staging
        run: |
          chmod +x scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL_STAGING: ${{ secrets.DEPLOY_WEBHOOK_URL_STAGING }}

  deploy_production:
    # Trigger only if it's a PUSH event to the 'main' branch
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Ensure tests pass before deploying
    needs: symfony-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Execute the custom deployment script
      - name: Deploy to production
        run: |
          chmod +x scripts/deploy-production.sh
          ./scripts/deploy-production.sh
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
